<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Industrial Pattern Decor -->
<div class="absolute inset-0 z-0 opacity-5 pointer-events-none">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-secondary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-[480px] z-10">
<!-- Brand Identity -->
<div class="mb-10 text-center">
<div class="inline-flex items-center gap-2 mb-4">
<div class="w-10 h-10 bg-industrial-gradient rounded-xl flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
</div>
<h1 class="font-headline text-xl font-extrabold tracking-tight text-primary">工业企业出海主数据平台</h1>
</div>
<p class="text-on-surface-variant font-medium tracking-wide text-sm opacity-80 uppercase">Enterprise Security • Data Sovereignty</p>
</div>
<!-- Reset Password Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_-4px_rgba(25,28,30,0.06)] border border-outline-variant/15 p-10 relative">
<div class="absolute top-0 left-0 w-1.5 h-full bg-industrial-gradient rounded-l-xl"></div>
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">重置账户密码</h2>
<p class="text-on-surface-variant text-sm">请输入注册手机号以验证身份并设置新密码</p>
</header>
<form class="space-y-6" onsubmit="return false;">
<!-- Mobile Phone Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">smartphone</span>
                        Mobile Phone
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="请输入手机号" type="tel"/>
</div>
</div>
<!-- Verification Code Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">verified_user</span>
                        SMS Code
                    </label>
<div class="flex gap-3">
<input class="flex-1 bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="验证码" type="text"/>
<button class="px-5 bg-surface-container-high text-on-primary-fixed-variant font-semibold text-sm rounded-lg hover:bg-surface-container-highest transition-colors active:scale-95 duration-200 whitespace-nowrap" type="button">
                            获取验证码
                        </button>
</div>
</div>
<!-- New Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">lock</span>
                        New Password
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="建议8-20位字符，包含字母与数字" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant tracking-wider uppercase flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm">shield_person</span>
                        Confirm New Password
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="请再次输入新密码" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-industrial-gradient text-white font-headline font-bold py-4 rounded-lg shadow-md hover:shadow-lg hover:opacity-95 active:scale-[0.98] transition-all duration-200 mt-4" type="submit">
                    重置密码
                </button>
</form>
<footer class="mt-8 pt-6 border-t border-outline-variant/10 flex justify-center">
<a class="inline-flex items-center gap-1 text-primary hover:text-on-primary-fixed-variant font-medium text-sm transition-colors group" href="#">
<span class="material-symbols-outlined text-lg transition-transform group-hover:-translate-x-1">arrow_back</span>

</footer>
</div>

<div class="flex items-center gap-4">
<span>Support: 400-888-999</span>
<span class="w-1 h-1 bg-outline rounded-full"></span>

</div>
