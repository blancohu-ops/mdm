server:
  port: 8083

spring:
  application:
    name: mdm-backend
  profiles:
    active: dev
  datasource:
    url: ${MDM_DB_URL:jdbc:postgresql://localhost:5432/mdm_dev}
    username: ${MDM_DB_USERNAME:postgres}
    password: ${MDM_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${MDM_REDIS_HOST:localhost}
      port: ${MDM_REDIS_PORT:6379}
      password: ${MDM_REDIS_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${MDM_SWAGGER_ENABLED:true}
  swagger-ui:
    enabled: ${MDM_SWAGGER_ENABLED:true}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"

mdm:
  security:
    jwt-secret: ${MDM_JWT_SECRET:replace-with-at-least-32-characters}
    access-token-minutes: ${MDM_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${MDM_REFRESH_TOKEN_DAYS:14}
    allowed-origins: ${MDM_ALLOWED_ORIGINS:http://localhost:5273,http://127.0.0.1:5273}
  storage:
    local-root: ${MDM_STORAGE_ROOT:backend/storage}
  integrations:
    sms-provider: ${MDM_SMS_PROVIDER:mock}
    ai-provider: ${MDM_AI_PROVIDER:mock}
